name: Tag Workflow
on:
  push:
    # 使用tags/*来监听所有的tag事件
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code with current tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run:
          #python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build project with Nuitka-Action
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          standalone: true
          enable-plugins: pyqt6
          windows-console-mode: disable
          windows-icon-from-ico: app/resource/images/logo.ico
          onefile: true
          lto: yes
          include-data-dir: app/resource=build/main.dist/app/resource tools=build/main.dist/tools

      - name: Get tag name
        id: get_tag
        run: |
          $current_tag = git describe --tags --abbrev=0 HEAD
          echo "tag=${current_tag}" >> $env:GITHUB_ENV

      - name: Get previous tag name
        id: get_previous_tag
        run: |
          $previous_tag = git tag --sort=-version:refname | Select-Object -Skip 1 | Select-Object -First 1
          echo "previous_tag=${previous_tag}" >> $env:GITHUB_ENV

      - name: Compress files
        run:
          echo $current_tag
          Compress-Archive -Path build/  -DestinationPath release/onemore_{{ env.tag }}.zip
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.tag }}
          release_name: Release ${{ env.tag }}
          draft: false
          prerelease: false

          body: |
            Changes in this Release
            https://github.com/miniLQ/onemore/compare/${{ env.previous_tag }}...${{ env.tag }}

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release/onemore_{{ env.tag }}.zip
          asset_name: onemore_{{ env.tag }}.zip
          asset_content_type: application/zip

      # - name: upload artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: windows Build
      #     tagname: ${{ steps.get_tag.outputs.tag }}
      #     path: release/onemore_${{ tagname }}.zip 